# Chest Mount TF Configuration
# TF 结构: chest -> {side}_chest_base (shared + rotation) -> {side}_chest (local)

chest_mount:
  # 共享平移 (chest 坐标系)
  shared:
    x: 0.0
    y: -0.2
    z: 0.12

  left:
    # 旋转 (radians)
    roll: 1.5708
    pitch: 0.0
    yaw: -1.5708
    # 局部平移 (left_chest_base 坐标系)
    local_x: 0.0
    local_y: 0.0
    local_z: 0.037

  right:
    roll: 1.5708
    pitch: 0.0
    yaw: 1.5708
    local_x: 0.0
    local_y: 0.0
    local_z: 0.037

# Wrist to Tianji TF
wrist_to_tianji:
  left:
    x: 0.0
    y: 0.0
    z: 0.0
    qx: 0.5
    qy: 0.5
    qz: 0.5
    qw: 0.5

  right:
    x: 0.0
    y: 0.0
    z: 0.0
    qx: 0.5
    qy: -0.5
    qz: -0.5
    qw: 0.5